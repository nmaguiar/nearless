    Title: NGINX Plus and NGINX Open Source have a vulnerability in the ngx_http_ ...
    Description: "NGINX Plus and NGINX Open Source have a vulnerability in the ngx_http_ssi_module\_module. This vulnerability may exist when the Server-Side Includes (SSI), proxy_pass, and proxy_buffering off\_directives are configured. With this configuration, an unauthenticated attacker with man-in-the-middle (MITM) ability to control responses from an upstream server may be able to cause a use-after-free in the NGINX worker process. This issue may lead to limited modification of memory or a restart of the NGINX worker process.\n\nImpact:\nThis vulnerability may allow remote attackers to have limited control to modify memory contents or restart the NGINX worker process. There is no control plane exposure; this is a data plane issue only.\n\nNote: Software versions which have reached End of Technical Support (EoTS) are not evaluated."
