    Title: NGINX Plus and NGINX Open Source have a vulnerability in the ngx_http_ ...
    Description: "NGINX Plus and NGINX Open Source have a vulnerability in the ngx_http_slice_module module. When the slice\_directive and unnamed regex captures are configured or when a background cache update happens, unauthenticated attackers can send requests that may cause uninitialized memory access in the NGINX worker process, leading to limited disclosure of memory or a restart.\n\nImpact:\nThis vulnerability may allow remote, unauthenticated attackers to have limited control to disclose memory contents or restart the NGINX worker process. There is no control plane exposure; this is a data plane issue only.\nNote: The ngx_http_slice_module\_module is not enabled by default; it's enabled with the --with-http_slice_module\_configuration parameter.\n\nNote: Software versions which have reached End of Technical Support (EoTS) are not evaluated."
